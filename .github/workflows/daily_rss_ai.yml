name: Daily Gemini RSS Reader

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间 10:00
  workflow_dispatch:

jobs:
  run-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install feedparser requests Pillow

      - name: Run Fetcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p images  # 强制创建 images 文件夹
          python fetch_and_ai_process.py

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update: Daily Gemini Summary"
          # 👇 这里的修改是关键：
          # 1. 删掉具体的 *.jpg 限制，直接指向文件夹
          # 2. 如果文件夹为空，这个 Action 也不再报错
          file_pattern: 'data/ images/'
          # 如果没有任何文件变化，不报错，直接跳过
          skip_dirty_check: false
